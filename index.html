<script>
const terms = [
  {
    term:"Cloud Computing",cat:"cloud",catLabel:"Cloud",
    exact:"The delivery of computing services — including servers, storage, databases, networking, software, and analytics — over the internet ('the cloud'), allowing companies to avoid owning and operating physical data centers and instead rent computing resources on demand.",
    simple:"Using someone else's computers over the internet instead of owning your own servers. Like renting electricity instead of building your own power plant.",
    example:"Netflix doesn't own the servers that stream your shows — it runs almost entirely on Amazon Web Services (AWS). When more people watch at night, Netflix automatically scales up rented servers and scales down in the morning."
  },
  {
    term:"SaaS (Software as a Service)",cat:"core",catLabel:"Core Concept",
    exact:"A cloud computing model in which software is hosted on remote servers managed by a vendor and accessed by users via a web browser on a subscription basis, rather than being installed locally on each device.",
    simple:"Paying a monthly fee to use software through your browser instead of downloading it. The software runs on the company's servers, not yours.",
    example:"Google Sheets, Salesforce, Canvas, and Microsoft 365 (online) are all SaaS. You don't install them — you log in through a browser. UT has a SaaS contract with Microsoft for Office and Copilot."
  },
  {
    term:"IaaS (Infrastructure as a Service)",cat:"cloud",catLabel:"Cloud",
    exact:"A cloud service model in which a provider supplies virtualized computing infrastructure (servers, storage, networking, hardware) over the internet. The customer manages the OS, databases, middleware, and applications, but outsources the physical hardware layer.",
    simple:"Renting the physical servers and data center from a cloud company, but still managing your own software and databases yourself.",
    example:"Netflix and Walmart both use IaaS — they rent AWS and Microsoft Azure hardware respectively, but their own engineering teams manage the software running on top of it."
  },
  {
    term:"PaaS (Platform as a Service)",cat:"cloud",catLabel:"Cloud",
    exact:"A cloud service model in which a provider supplies a managed platform — including hardware, OS, database, and middleware — leaving the customer responsible only for developing and managing their own applications at the top of the stack.",
    simple:"Renting everything except the apps themselves — the provider handles the servers, OS, and databases; you just write and deploy your software on top.",
    example:"Salesforce relies on PaaS so its enterprise customers can build custom apps connected to Salesforce data without managing any underlying infrastructure."
  },
  {
    term:"On-Premise (Traditional) Software",cat:"core",catLabel:"Core Concept",
    exact:"Software that is installed and run on computers physically located within an organization's own facilities, requiring the company to manage its own hardware, OS, database, middleware, and applications.",
    simple:"The old way: buying software, installing it on your own computers, and managing everything yourself — including when things break at 2 AM.",
    example:"A company running SAP ERP on their own data center servers — they bought the license, installed it on their hardware, and their IT team maintains it. High upfront cost but full control."
  },
  {
    term:"Freemium Pricing Model",cat:"biz",catLabel:"Business Model",
    exact:"A SaaS pricing strategy in which a basic version of the product is offered free of charge, while advanced features, higher usage limits, or premium tiers require a paid subscription. Designed to acquire users at low cost and convert a percentage to paying customers.",
    simple:"Give away the basic version for free to get people hooked, then charge for the good stuff.",
    example:"Spotify: free tier with ads and shuffle-only, premium tier removes ads and adds downloads. Dropbox: free 2GB storage, paid plans for more space. Zoom: free for 40-minute meetings, paid for longer."
  },
  {
    term:"Usage-Based Pricing",cat:"biz",catLabel:"Business Model",
    exact:"A SaaS billing model in which customers are charged based on their actual consumption of the service — such as number of users, API calls, data stored, or compute hours — rather than a flat subscription fee.",
    simple:"Pay only for what you actually use, like a phone plan that charges per GB of data used.",
    example:"AWS charges by the hour for compute and by the GB for storage. A small startup pays almost nothing; Netflix pays millions because they use enormous amounts of compute."
  },
  {
    term:"Total Cost of Ownership (TCO)",cat:"tco",catLabel:"TCO",
    exact:"The complete financial cost of acquiring, deploying, operating, and maintaining a technology system over its entire lifecycle. TCO includes not just the purchase price (~20%) but hidden costs like training, integration, support, efficiency loss during transition, and future upgrades (~80%).",
    simple:"The real total cost of a technology decision — not just the sticker price, but every dollar spent to keep it running over its whole life.",
    example:"A company might pay $500K for enterprise software licenses, but TCO over 5 years could be $2.5M once you add implementation consultants (Accenture/IBM), training, ongoing support, and the eventual system upgrade."
  },
  {
    term:"TCO Components",cat:"tco",catLabel:"TCO",
    exact:"The full components of TCO include: (1) requirements analysis & site prep, (2) software purchase & license support, (3) implementation & deployment costs including training and initial efficiency reduction, (4) ongoing operational support, (5) strategic development costs as the competitive landscape evolves.",
    simple:"All the hidden costs of software: setup, training, the period where everyone is slow while learning, ongoing maintenance, and future upgrades as things change.",
    example:"When UT adopts a new LMS, TCO includes: evaluating options, licensing fees, migrating old course content, training 3,000 faculty, the semester where grades are accidentally lost (efficiency reduction), and annual support."
  },
  {
    term:"Latency",cat:"risk",catLabel:"SaaS Risk",
    exact:"The delay between a user's action (sending a request) and receiving a response, caused by data traveling across networks. In SaaS, latency increases as data must travel from the user's device → through WiFi → to a remote server → and back, making performance slower than locally-executed software.",
    simple:"The lag time between clicking something and seeing it happen. When your software lives on a server far away, more network travel = more delay.",
    example:"When UT students use online Excel (SaaS) and upload a file stored in UT Box to Canvas, the file travels from Box servers → browser → Canvas servers — all that network travel can cause the file to appear blank if the upload times out."
  },
  {
    term:"Vendor Lock-In",cat:"risk",catLabel:"SaaS Risk",
    exact:"A situation where a customer becomes so dependent on a single vendor's platform, data formats, or ecosystem that switching to an alternative becomes prohibitively expensive or technically difficult, often resulting in unforeseen switching costs.",
    simple:"Getting stuck with one company because leaving would be too painful or expensive — they have all your data in their format and you're dependent on their ecosystem.",
    example:"A company that builds all its custom apps inside Salesforce's platform is locked in — if Salesforce doubles its prices, migrating 10 years of data and rebuilt workflows to a competitor would cost millions."
  },
  {
    term:"Switching Costs",cat:"risk",catLabel:"SaaS Risk",
    exact:"The costs — financial, operational, and time-based — a company incurs when migrating from one software platform to another, including data migration, retraining, workflow redesign, and integration re-engineering.",
    simple:"The pain and expense of changing from one software to another — transferring data, retraining everyone, and rebuilding all your customizations.",
    example:"When a university switches from one LMS to another, switching costs include: migrating 50,000 course files, retraining 3,000 faculty, rebuilding integrations with Canvas, and the lost productivity semester."
  },
  {
    term:"Economies of Scale",cat:"cloud",catLabel:"Cloud",
    exact:"The cost advantages that arise when a provider can spread fixed infrastructure costs (data centers, hardware, cooling, security) across millions of customers, making per-unit costs far lower than any single company could achieve by building their own infrastructure.",
    simple:"Big cloud providers can offer cheap computing because they serve millions of customers from the same massive data centers — individual companies could never match that price building their own.",
    example:"AWS has data centers with millions of servers serving customers worldwide. The cost per server is a fraction of what any single company could achieve. That's why even large companies like Netflix choose to rent rather than own."
  },
  {
    term:"Scalability",cat:"cloud",catLabel:"Cloud",
    exact:"A comprehensive cloud computing platform provided by Amazon that offers on-demand access to a broad set of IT infrastructure services — including computing power, storage, databases, networking, analytics, and machine learning — delivered over the internet on a pay-as-you-go pricing model.",
    simple:"The ability to instantly grow or shrink your computing power as needed — like having a magic warehouse that expands when you need more space and shrinks when you don't.",
    example:"During tax season, TurboTax Online (SaaS) handles 10x normal traffic. Rather than owning servers that sit idle 11 months a year, it automatically scales up rented cloud capacity in April and scales back down in May."
  },
  {
    term:"Amazon Web Services (AWS)",cat:"cloud",catLabel:"Cloud",
    exact:"The cost advantages that arise when a provider can spread fixed infrastructure costs (data centers, hardware, cooling, security) across millions of customers, making per-unit costs far lower than any single company could achieve by building their own infrastructure.",
    simple:"Amazon's platform that lets businesses rent computer power, storage, and other tech tools over the internet instead of buying their own expensive equipment.",
    example:"AWS has data centers with millions of servers serving customers worldwide. The cost per server is a fraction of what any single company could achieve. That's why even large companies like Netflix choose to rent rather than own."
  },
  {
    term:"Consumerization of Technology",cat:"cloud",catLabel:"Cloud",
    exact:"The trend in which consumer-grade technologies, devices, and applications (originally designed for personal use) are adopted and integrated into enterprise/business environments, shifting the influence of technology from IT departments to end users.",
    simple:"When everyday personal tech (like smartphones or apps) starts being used in the workplace, and employees expect their work tools to be just as easy and modern as their personal ones.",
    example:"Employees start using their personal iPhones and iPads for work tasks, and companies adopt tools like Slack or Zoom — originally popular among consumers — as official business communication platforms."
  },
  {
    term:"Service Level Agreement (SLA)",cat:"biz",catLabel:"Business Model",
    exact:"A formal, legally binding contract between a service provider and a customer that defines the expected level of service, including performance metrics (such as uptime, response time, and availability), responsibilities of each party, and the remedies or penalties if those standards are not met.",
    simple:"A written promise (contract) between a company and its customer that spells out exactly what service will be provided, how good it will be, and what happens if the company doesn't deliver.",
    example:"A cloud storage company signs an SLA with a business guaranteeing 99.9% uptime. If the service goes down more than that, the business is entitled to a credit or refund on their bill."
  },
  {
    term:"Software Piracy (and SaaS Prevention)",cat:"biz",catLabel:"Business Model",
    exact:"The unauthorized copying, distribution, or use of commercial software without a valid license. SaaS effectively eliminates piracy risk because the software never exists as a downloadable file on user devices — it runs entirely on the vendor's servers and requires authenticated login.",
    simple:"Illegally copying software. SaaS makes this nearly impossible because you're accessing a service that requires login, not downloading a file you could copy.",
    example:"You could pirate the traditional desktop version of Photoshop by copying its installer. You cannot pirate Adobe Creative Cloud (SaaS) — there's nothing to copy; you log in to their servers. This is why Adobe switched to subscription-only."
  },
  {
    term:"Mission-Critical Systems",cat:"risk",catLabel:"SaaS Risk",
    exact:"Information systems whose failure would cause immediate and severe harm to an organization's operations, revenue, safety, or legal compliance. These require the highest levels of reliability and are approached with special caution in cloud migration decisions.",
    simple:"Systems so important that if they go down, the business stops working or people get hurt — like a hospital's patient records system or an airline's booking system.",
    example:"A hospital's patient record system is mission-critical. Moving it to a cloud vendor that has an outage means doctors can't access medication histories. The slide warns: 'If a cloud vendor fails you and all your eggs are in one basket, then you're down, too.'"
  },
  {
    term:"SaaS vs. Licensed Software (TCO Comparison)",cat:"tco",catLabel:"TCO",
    exact:"A comparison showing that Traditional/Licensed software has very high upfront implementation costs (system purchase + deployment) but lower ongoing costs, while SaaS has low upfront costs but constant recurring subscription fees. SaaS wins on most TCO factors except software license support, where perpetual licenses can be cheaper long-term.",
    simple:"Old-school software costs a lot to start and less over time. SaaS is cheap to start but you pay forever. SaaS usually wins overall because those huge upfront costs are brutal.",
    example:"Buying enterprise CRM software: $2M upfront + $500K/year support = $4.5M over 5 years. Salesforce SaaS: $0 upfront + $1M/year = $5M over 5 years. But SaaS wins on deployment speed and requires no IT staff to maintain servers."
  },
  {
    term:"Ping (Network Diagnostics)",cat:"cloud",catLabel:"Cloud",
    exact:"A network diagnostic command that sends a small packet of data to a specified IP address or domain and measures the round-trip time (latency) for the response. Used to determine where servers are physically located and how far data travels.",
    simple:"A tool that checks how fast your computer can reach another computer — like shouting 'Hello!' across a room and timing how long it takes to hear 'Hello!' back.",
    example:"Running 'ping utexas.edu' from a UT classroom shows the server is nearby (low ms response). Running 'ping utexas.instructure.com' (Canvas) shows a much higher ms response because Canvas runs on AWS servers in a different state."
  },
];

const questions = [
  {
    num:1,
    scenario:"You're helping your roommate choose between two options for her new photography side business. Option A is Adobe Lightroom (desktop) — a one-time $150 purchase that installs on her laptop. Option B is Adobe Creative Cloud — $54.99/month, runs in her browser or as a thin client, stores files in Adobe's cloud, and automatically updates. She asks you which is SaaS.",
    stem:"Which option is SaaS, and what is the defining characteristic that makes it so?",
    options:[
      {letter:"A",text:"Option A (desktop Lightroom), because it uses closed source code and runs with a single license."},
      {letter:"B",text:"Option B (Creative Cloud), because the software is hosted on Adobe's remote servers and accessed via subscription rather than installed locally as a standalone executable."},
      {letter:"C",text:"Both options are SaaS because they are both made by Adobe and sold directly to consumers."},
      {letter:"D",text:"Option B (Creative Cloud), because it uses open standards that allow other companies to build compatible editing plugins."},
    ],
    correct:"B",
    explanation:`<strong>✅ Correct Answer: B.</strong> The defining characteristics of SaaS are (1) hosted on vendor's remote servers, (2) accessed via browser/network, and (3) subscription-based billing. Creative Cloud checks all three. Desktop Lightroom is locally executed, traditionally licensed software — the opposite of SaaS.<br><br>
<strong>Why the others are wrong:</strong><br>
<strong>A</strong> — Closed source code and single licensing describe traditional proprietary software, not SaaS. Running locally is the opposite of SaaS.<br>
<strong>C</strong> — Both being made by the same company is irrelevant. SaaS is defined by delivery model and execution location, not vendor identity.<br>
<strong>D</strong> — Open standards refers to whether other companies can build compatible software without permission. While Creative Cloud does use open standards, this is NOT what defines it as SaaS.`
  },
  {
    num:2,
    scenario:"Your friend is a junior product manager at a startup that built a new B2B analytics dashboard. Their current pricing model charges every customer a flat $200/month regardless of usage. Several small customers have complained it's too expensive for them, while their biggest enterprise client — who runs 500 reports per day — says it's the cheapest software they've ever bought. The CEO wants to fix this.",
    stem:"Which pricing model would MOST effectively align cost with the value each customer receives?",
    options:[
      {letter:"A",text:"Freemium pricing, which gives the core product away for free and charges only for advanced AI features."},
      {letter:"B",text:"Usage-based pricing, where customers are billed based on the number of reports run or data processed, so small customers pay little and heavy users pay more."},
      {letter:"C",text:"On-premise licensing, where customers pay a one-time fee to own and install the software on their own servers."},
      {letter:"D",text:"Open-source licensing, which lets customers modify the code for free and pay only for optional support contracts."},
    ],
    correct:"B",
    explanation:`<strong>✅ Correct Answer: B — Usage-based pricing.</strong> The slides describe usage-based pricing as billing based on actual consumption. Small customers who run 5 reports/month pay almost nothing; the enterprise running 500/day pays significantly more. This directly aligns price with delivered value and solves both complaints simultaneously.<br><br>
<strong>Why the others are wrong:</strong><br>
<strong>A (Freemium)</strong> — Freemium gives away the basic product to attract users and charges for premium features. It doesn't solve the "heavy user pays the same as light user" mismatch — the enterprise client would still get a bargain.<br>
<strong>C (On-premise)</strong> — This is the opposite direction — moving to traditional software distribution. It shifts all infrastructure burden to the customer, which is worse for both parties.<br>
<strong>D (Open-source)</strong> — Open-source licensing is about source code accessibility, not a pricing strategy for a SaaS product.`
  },
  {
    num:3,
    scenario:"Your cousin manages IT for a mid-size regional hospital in Austin. The hospital's CFO wants to move their patient records system, billing software, and radiology imaging system all to a SaaS provider by next quarter to cut costs. Your cousin is nervous and asks for your MIS 301 perspective.",
    stem:"Which concern BEST explains why your cousin should advise the CFO to proceed cautiously?",
    options:[
      {letter:"A",text:"SaaS providers use open standards, which means competitors could access the hospital's patient data without permission."},
      {letter:"B",text:"The hospital will experience significantly higher upfront implementation costs with SaaS compared to traditional on-premise software."},
      {letter:"C",text:"Moving mission-critical systems to a single cloud vendor creates dangerous dependency — a vendor outage could prevent doctors from accessing patient records, and data stored off-site raises legal and regulatory compliance concerns."},
      {letter:"D",text:"SaaS software always has fewer features than desktop software, so radiology imaging tools in the cloud will be technically inferior."},
    ],
    correct:"C",
    explanation:`<strong>✅ Correct Answer: C — Mission-Critical Systems + Vendor Risk.</strong> The slides state: "If a cloud vendor fails you and all your eggs are in one basket, then you're down, too." For a hospital, downtime means doctors can't access patient medication histories — a life-safety issue. Additionally, HIPAA compliance requires strict control over where patient data is stored, making the off-site security concern real and legally significant.<br><br>
<strong>Why the others are wrong:</strong><br>
<strong>A</strong> — Open standards allow other companies to build compatible software, not to access a hospital's private data. This confuses open standards with a data security breach scenario.<br>
<strong>B</strong> — This is backwards. SaaS is specifically noted for having low upfront implementation costs compared to traditional on-premise deployments. High upfront costs are a characteristic of traditional licensed software.<br>
<strong>D</strong> — While SaaS products sometimes lack specific features (the slides note online Excel missing Scenario Manager), "always inferior" is an overstatement. Modern SaaS tools are often feature-complete, and this isn't the primary concern for a hospital's decision.`

    explanation:`<strong>✅ Correct Answer: C — Full TCO Framework.</strong> The slides explicitly show that purchase price represents only ~20% of TCO, while hidden costs (support, fixes, integration, training, upgrades) represent ~80%. Current system 5-year TCO: $15,000 license + $8,000 implementation + $10,000 IT support (5 years) + future upgrade = ~$33,000+. Toast 5-year TCO: $9,900 subscription + minimal implementation = ~$10,000-12,000. Toast likely wins substantially on full TCO.<br><br>

<strong>B</strong> — While perpetual licenses can be cheaper long-term, the slides show SaaS wins on most TCO factors except "software purchase and license support." Ignoring implementation and ongoing support understates the current system's true cost.<br>

const catMap={core:'cat-core',cloud:'cat-cloud',biz:'cat-biz',risk:'cat-risk',tco:'cat-tco'};
function renderVocab(data){
  const g=document.getElementById('vocab-grid');g.innerHTML='';
  if(!data.length){g.innerHTML='<div class="no-results">No terms match your search.</div>';document.getElementById('vocab-count').textContent='';return}
  document.getElementById('vocab-count').textContent=`Showing ${data.length} of ${terms.length} terms`;
  data.forEach(t=>{
    const cls=catMap[t.cat]||'cat-core';
    g.innerHTML+=`<div class="vocab-card"><div class="card-head"><div class="card-term">${t.term}</div><span class="cat-tag ${cls}">${t.catLabel}</span></div><div class="card-body"><div class="def-label">Exact Definition</div><div class="def-text">${t.exact}</div><div class="def-label">Simple Definition</div><div class="def-text">${t.simple}</div><div class="example-block"><div class="def-label">Example</div><div class="def-text">${t.example}</div></div></div></div>`;
  });
}
function filterCards(){const q=document.getElementById('search-input').value.toLowerCase();renderVocab(!q?terms:terms.filter(t=>[t.term,t.exact,t.simple,t.example,t.catLabel].some(s=>s.toLowerCase().includes(q))));}
let answered=0,score=0;
function renderQuiz(){
  answered=0;score=0;updateScore();
  const c=document.getElementById('quiz-container');c.innerHTML='';
  questions.forEach(q=>{
    const opts=q.options.map(o=>`<button class="opt-btn" onclick="answer(this,'${o.letter}','${q.correct}',${q.num})"><span class="opt-letter">${o.letter}.</span> ${o.text}</button>`).join('');
    c.innerHTML+=`<div class="question-card" id="qcard-${q.num}"><div class="q-num">Question ${q.num} of 5</div><div class="q-scenario">${q.scenario}</div><div class="q-stem">${q.stem}</div><div class="options" id="opts-${q.num}">${opts}</div><div id="exp-${q.num}"></div></div>`;
  });
}
function answer(btn,chosen,correct,qNum){
  document.querySelectorAll(`#opts-${qNum} .opt-btn`).forEach(b=>{b.disabled=true;const l=b.querySelector('.opt-letter').textContent.replace('.','').trim();if(l===correct)b.classList.add('correct');});
  if(chosen!==correct)btn.classList.add('wrong');else score++;
  document.getElementById(`exp-${qNum}`).innerHTML=`<div class="explanation">${questions[qNum-1].explanation}</div>`;
  answered++;updateScore();
}
function updateScore(){document.getElementById('score-display').textContent=score;document.getElementById('progress-fill').style.width=(answered/5*100)+'%';}
function resetQuiz(){renderQuiz();}
function switchTab(id,btn){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');}
renderVocab(terms);renderQuiz();
</script>
